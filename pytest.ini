[pytest]
DJANGO_SETTINGS_MODULE = quot_pse.settings
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test discovery scope: only our first-party app tests. Avoids picking
# up tests bundled with third-party packages in .venv and stubbed
# sales/production apps.
testpaths =
    accounting/tests
    budget/tests
    contracts/tests

# Always print short tracebacks + one-line failure summary. Treat
# warnings as errors only for our own code (keeps third-party
# deprecation noise out).
addopts =
    -ra
    --tb=short
    --strict-markers
    --strict-config
    -p no:warnings

markers =
    integration: tests that hit the DB and run inside a tenant schema
    slow: tests that take > 1 second (kept out of pre-commit fast lane)
    ipsas: IPSAS-compliance regression tests
    audit: audit-trail hardening regression tests
