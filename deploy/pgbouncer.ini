; =============================================================================
; PgBouncer Configuration for DTSG ERP — Phase 1
; =============================================================================
;
; Install: sudo apt-get install pgbouncer
; Start:   pgbouncer -d /etc/pgbouncer/pgbouncer.ini
;
; Django connects to pgbouncer (port 6432) instead of PostgreSQL directly.
; Update .env: DB_PORT=6432
;
; This multiplexes 1000 client connections over ~50 actual PostgreSQL
; connections, allowing 50-100+ concurrent tenants.
; =============================================================================

[databases]
; Format: dbname = host=<pg_host> port=<pg_port> dbname=<pg_dbname>
quot_pse = host=localhost port=5432 dbname=quot_pse

[pgbouncer]
; Listen on port 6432 (Django points here instead of 5432)
listen_addr = 127.0.0.1
listen_port = 6432

; Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Pool mode: 'transaction' is required for django-tenants
; because SET search_path is a session-level command, BUT
; django-tenants sets it per-request via the connection wrapper.
; Use 'session' if you encounter schema leakage; 'transaction' for max efficiency.
pool_mode = session

; Connection pool sizes
; default_pool_size: max connections PER database PER user
default_pool_size = 50
min_pool_size = 10
reserve_pool_size = 10

; Client connections
max_client_conn = 1000

; Timeouts
server_idle_timeout = 60
server_connect_timeout = 10
server_login_retry = 3
query_timeout = 300
query_wait_timeout = 30

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; Admin access (for monitoring: SHOW POOLS, SHOW STATS)
admin_users = dtsg
stats_users = dtsg
