name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # ═════════════════════════════════════════════════════════════════════
  # Backend — Django + pytest + ruff + bandit
  # ═════════════════════════════════════════════════════════════════════
  backend:
    name: Backend (Django + pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: quot
          POSTGRES_PASSWORD: quot
          POSTGRES_DB: quot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: quot_pse.settings
      DATABASE_URL: postgres://quot:quot@localhost:5432/quot_test
      DEBUG: "1"
      SECRET_KEY: ci-insecure-key-not-for-prod
      ALLOWED_HOSTS: "*"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            'Django==4.2.28' \
            django-tenants \
            djangorestframework \
            djangorestframework-simplejwt \
            django-filter \
            django-cors-headers \
            django-celery-beat \
            django-simple-history \
            psycopg2-binary \
            Pillow \
            openpyxl \
            reportlab \
            pytest==7.4.4 \
            pytest-django \
            pytest-cov \
            ruff \
            bandit

      # ── Linters + security (advisory on main; enforced on PRs once clean)
      - name: Lint (ruff)
        run: ruff check accounting budget procurement core --select E,F,W --ignore E501
        continue-on-error: true

      - name: Security scan (bandit)
        run: bandit -r accounting budget core -ll -q
        continue-on-error: true

      # ── Hard gates
      - name: Django system check
        run: python manage.py check

      - name: Migration consistency
        run: python manage.py makemigrations --check --dry-run

      # ── Fast-tier tests (no-DB, must pass)
      - name: Pytest — no-DB fast tier
        run: |
          pytest \
            accounting/tests/test_s14*.py \
            accounting/tests/test_s15*.py \
            accounting/tests/test_s16*.py \
            accounting/tests/test_s17*.py \
            accounting/tests/test_s18*.py \
            accounting/tests/test_s19*.py \
            accounting/tests/test_s20*.py \
            accounting/tests/test_s21*.py \
            accounting/tests/test_s25*.py \
            core/tests/test_s23*.py \
            core/tests/test_s24*.py \
            -v \
            --cov=accounting --cov=core --cov=budget \
            --cov-report=xml \
            --cov-report=term

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: ignore

  # ═════════════════════════════════════════════════════════════════════
  # Frontend — TypeScript check + build
  # ═════════════════════════════════════════════════════════════════════
  frontend:
    name: Frontend (TypeScript + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build (production bundle)
        run: npm run build

      - name: Upload bundle artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: ignore

  # ═════════════════════════════════════════════════════════════════════
  # End-to-end (Playwright) — exercises the full Django + Vite stack
  # against a seeded test tenant. Requires repo secrets:
  #   E2E_USER, E2E_PASSWORD       — test login (must exist in CI tenant)
  #   E2E_TENANT_DOMAIN            — tenant domain for X-Tenant-Domain header
  #   E2E_TENANT_SCHEMA            — django-tenants schema name
  #   E2E_APPROPRIATION_ID         — id of an active appropriation in tenant
  # The "Run Playwright suite" step skips at runtime when E2E_USER is
  # empty (see `if:` on that step) so PRs from forks without secrets
  # don't fail noisily.
  # ═════════════════════════════════════════════════════════════════════
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: quot
          POSTGRES_PASSWORD: quot
          POSTGRES_DB: quot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: quot_pse.settings
      DATABASE_URL: postgres://quot:quot@localhost:5432/quot_test
      DEBUG: "1"
      SECRET_KEY: ci-insecure-key-not-for-prod
      ALLOWED_HOSTS: "*"
      # Loosen rates so the suite (which makes ~80 API calls) doesn't
      # trip the production-strict throttle.
      USER_THROTTLE_RATE: 20000/hour
      ANON_THROTTLE_RATE: 2000/hour
      LOGIN_THROTTLE_RATE: 120/min

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Migrate (shared + tenant schemas)
        run: |
          python manage.py migrate_schemas --shared
          python manage.py migrate_schemas --tenant || true

      - name: Seed E2E tenant + dimensions + appropriation + vendor
        env:
          E2E_TENANT_SCHEMA: ${{ secrets.E2E_TENANT_SCHEMA || 'ci_e2e' }}
          E2E_TENANT_DOMAIN: ${{ secrets.E2E_TENANT_DOMAIN || 'ci_e2e.dtsg.test' }}
          E2E_USER: ${{ secrets.E2E_USER || 'ci_admin' }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD || 'Insecure-CI-1234' }}
        run: |
          python manage.py seed_e2e_tenant \
            --schema="$E2E_TENANT_SCHEMA" \
            --domain="$E2E_TENANT_DOMAIN" \
            --username="$E2E_USER" \
            --password="$E2E_PASSWORD" | tee seed-output.json
          # Extract appropriation_id for the test runner.
          echo "E2E_APPROPRIATION_ID=$(python -c 'import json; print(json.load(open(\"seed-output.json\"))[\"appropriation_id\"])')" >> $GITHUB_ENV

      - name: Start Django
        run: nohup python manage.py runserver 0.0.0.0:8000 --noreload > backend.log 2>&1 &

      - name: Start Vite
        run: nohup npm run dev -- --host 0.0.0.0 > vite.log 2>&1 &
        working-directory: frontend

      - name: Wait for servers
        run: |
          npx wait-on tcp:8000 tcp:5173 --timeout 60000
        working-directory: frontend

      - name: Run Playwright suite
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_API_URL: http://localhost:8000
          E2E_USER: ${{ secrets.E2E_USER }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_TENANT_DOMAIN: ${{ secrets.E2E_TENANT_DOMAIN }}
          E2E_APPROPRIATION_ID: ${{ secrets.E2E_APPROPRIATION_ID }}
        run: |
          if [ -z "$E2E_USER" ]; then
            echo "::warning::E2E_USER secret not set — skipping Playwright run."
            exit 0
          fi
          npx playwright test
        working-directory: frontend

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-server-logs
          path: |
            backend.log
            frontend/vite.log
          if-no-files-found: ignore

  # ═════════════════════════════════════════════════════════════════════
  # Secret scan
  # ═════════════════════════════════════════════════════════════════════
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Allow the job to advisory-fail on the first run so existing
          # low-severity findings don't block the rollout. Flip to
          # GITLEAKS_EXIT_CODE=1 once the baseline is clean.
          GITLEAKS_EXIT_CODE: "0"
