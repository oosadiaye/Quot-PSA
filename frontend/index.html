    <!--
      Mobile web-app capability — both names kept so iOS Safari (which
      still reads apple-prefixed) and modern Chrome / Edge / Firefox
      (which deprecated apple-* in favour of the vendor-neutral name)
      get the right signal. Removing the apple-* line entirely would
      lose iOS standalone-mode support.
    -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
